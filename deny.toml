# deny.toml — Configuração do `cargo-deny` para supply-chain hardening.
# Três camadas: advisories (vulnerabilidades + unmaintained), licenses (SPDX permissivas),
# sources (apenas registry oficial crates.io + sem git remotes desconhecidos).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [

    # RUSTSEC-2025-0052 — `async-std` descontinuado em 2025 (recomendação: migrar para `smol`).
    # Dependência transitiva via `chromiumoxide 0.7` → `async-tungstenite 0.27` → `async-std`.
    # Aparece APENAS quando o build ativa a feature opcional `chrome`; build default não puxa.
    # Não há upgrade seguro: `chromiumoxide` ainda não migrou o transport async.
    # Impacto: baixo — runtime I/O apenas para automação de navegador em modo `--fetch-content`.
    # Revisar quando `chromiumoxide 0.8+` for lançado migrando para `smol` ou `tokio` puro.
    "RUSTSEC-2025-0052",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "MPL-2.0",
    # CDLA-Permissive-2.0: licença permissiva (Linux Foundation) usada por `webpki-roots`
    # para distribuir a lista de raízes da Mozilla CA. Compatível com MIT/Apache-2.0.
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"

# skip-tree: suppress ALL duplicate-version warnings rooted at these crates.
# Each entry skips the named crate AND every transitive dependency it pulls in
# that would otherwise trigger a duplicate-version error.
#
# Root cause 1 — chromiumoxide 0.7
#   Brings in the async-std 1.x ecosystem (async-tungstenite 0.27, async-std 1.13,
#   async-channel 1.x, event-listener 2.x, syn 1.x, winreg 0.52 → windows-sys 0.48,
#   socket2 0.5, cpufeatures 0.2, getrandom 0.2, hashbrown 0.12, …).
#   No upstream fix available: chromiumoxide has not released 0.8+ migrating away
#   from async-std. Review when chromiumoxide 0.8+ ships or is replaced.
skip-tree = [
    { crate = "chromiumoxide@0.7.0", reason = "async-std + winreg ecosystem duplicates; no upgrade path until chromiumoxide 0.8+" },

    # Root cause 2 — console-subscriber 0.4.1
    #   Pulls tonic 0.12.3 → tower 0.4.13 (while reqwest/axum already use tower 0.5).
    #   Also brings hdrhistogram 7.5.4 → base64 0.21 (while the rest of the tree uses 0.22).
    #   Review when tokio-console / console-subscriber releases a version depending on
    #   tonic 0.13+ (which requires tower 0.5+) and hdrhistogram 8+ (base64 0.22).
    { crate = "console-subscriber@0.4.1", reason = "tonic 0.12/tower 0.4/hdrhistogram/base64 0.21 duplicates; awaiting console-subscriber upgrade to tonic 0.13+" },


]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
