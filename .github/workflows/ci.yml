# CI para duckduckgo-search-cli.
#
# 10 gates de validação conforme `CLAUDE.md`:
#   1. cargo check --all-targets                  → 0 erros
#   2. cargo clippy --all-features -- -D warnings → 0 warnings
#   3. cargo fmt --all --check                    → 0 diffs
#   4. RUSTDOCFLAGS="-D warnings" cargo doc       → 0 warnings
#   5. cargo test --all-features                  → 0 falhando
#   6. cargo llvm-cov                             → ≥ 80%
#   7. cargo audit                                → 0 vulnerabilidades
#   8. cargo deny check                           → advisories/licenses/bans/sources OK
#   9. cargo publish --dry-run                    → 0 erros
#  10. cargo package --list                       → 0 arquivos sensíveis
#
# Matrix cross-platform: ubuntu-latest (GNU + musl), macos-latest, windows-2022 (pinned).
#
# Jobs adicionais:
#   - msrv: valida rust-version declarado
#   - no_default_features: build mínimo
#   - supply_chain: audit + deny
#   - publish_dry_run: 9 + 10
#   - musl_smoke: smoke test Alpine
#   - commit_check: bloqueia Co-authored-by de agentes IA
#   - scheduled_update: atualiza deps em Cron semanal
#   - zizmor: security scan estático de workflows
#
# HISTÓRICO DE CORREÇÕES:
#   2026-06-05 (1.0) — Hardening completo
#     - Node 24 opt-in (FORCE_JAVASCRIPT_ACTIONS_TO_NODE24)
#     - SIGPIPE guard explícito em cargo test
#     - windows-2022 PIN (evita redirect para windows-2025-vs2026)
#     - Actions v6 (Node 24 nativo)
#     - softprops/action-gh-release@v3 quando aplicável
#     - Cron semanal de dependências desatualizadas
#     - Job zizmor para security scan de workflows
#     - set -euo pipefail em todos os bash steps
#     - Concurrency com cancel-in-progress APENAS em PR
#     - Fallback para SIGPIPE em test
#     - Permissions mínimas por job

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Cron semanal: domingo 03:00 UTC. Atualiza Cargo.lock com deps mais novas.
  schedule:
    - cron: "0 3 * * 0"
  # Permite re-run manual.
  workflow_dispatch:

# -----------------------------------------------------------------------------
# Concurrency: cancela runs antigos do mesmo PR/branch em PUSH, mas nunca cancela
# em schedule (precisamos do output completo).
# -----------------------------------------------------------------------------
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short
  # Belt-and-suspenders: força Node 24 em actions que ainda usam Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Gate rápido em matrix cross-platform. windows-2022 PINADO.
  # -------------------------------------------------------------------------
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check (gate 1)
        run: |
          set -euo pipefail
          cargo check --all-targets --all-features --locked

      - name: cargo clippy -D warnings (gate 2)
        run: |
          set -euo pipefail
          cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: cargo fmt --check (gate 3)
        run: |
          set -euo pipefail
          cargo fmt --all --check

      - name: cargo doc -D warnings (gate 4)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          set -euo pipefail
          cargo doc --no-deps --all-features --locked

      - name: cargo test (gate 5) — SIGPIPE tolerant
        run: |
          set -eo pipefail
          cargo test --all-features --locked || {
            ec=$?
            if [ $ec -eq 141 ]; then
              echo "::warning::SIGPIPE capturado durante tests (exit 141), considerando flaky"
              exit 0
            fi
            exit $ec
          }

      - name: smoke test (--version, --help)
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" == "Windows" ]; then
            BIN="./target/debug/duckduckgo-search-cli.exe"
          else
            BIN="./target/debug/duckduckgo-search-cli"
          fi
          "$BIN" --version
          "$BIN" --help

  # -------------------------------------------------------------------------
  # MSRV gate — verifica que `rust-version` em Cargo.toml é respeitado.
  # -------------------------------------------------------------------------
  msrv:
    name: msrv (Cargo.toml rust-version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract rust-version from Cargo.toml
        id: msrv
        run: |
          set -euo pipefail
          MSRV=$(grep -E '^rust-version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          if [ -z "$MSRV" ]; then
            echo "::error::rust-version não declarado em Cargo.toml"
            exit 1
          fi
          echo "version=$MSRV" >> "$GITHUB_OUTPUT"
          echo "MSRV detectado: $MSRV"

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-${{ steps.msrv.outputs.version }}

      - name: cargo check no MSRV
        run: |
          set -euo pipefail
          cargo check --all-targets --all-features --locked

      - name: cargo build no MSRV (--no-default-features)
        run: |
          set -euo pipefail
          cargo build --no-default-features --locked

  # -------------------------------------------------------------------------
  # Cobertura (gate 6) — roda apenas em Ubuntu (LLVM source-based).
  # -------------------------------------------------------------------------
  coverage:
    name: coverage ≥ 80%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain with llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo llvm-cov --fail-under-lines 80
        run: |
          set -euo pipefail
          cargo llvm-cov --all-features --locked --fail-under-lines 80

  # -------------------------------------------------------------------------
  # Build sem features default — garante que o binário mínimo compila.
  # -------------------------------------------------------------------------
  no_default_features:
    name: build --no-default-features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --no-default-features
        run: |
          set -euo pipefail
          cargo build --no-default-features --locked

      - name: cargo check --no-default-features
        run: |
          set -euo pipefail
          cargo check --all-targets --no-default-features --locked

  # -------------------------------------------------------------------------
  # Supply chain (gates 7, 8) e publicação (gates 9, 10).
  # -------------------------------------------------------------------------
  supply_chain:
    name: supply chain (audit + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo audit (gate 7)
        run: |
          set -euo pipefail
          cargo audit --deny yanked

      - name: cargo deny check (gate 8)
        run: |
          set -euo pipefail
          cargo deny check advisories licenses bans sources

  publish_dry_run:
    name: publish dry-run + package list
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo publish --dry-run (gate 9)
        run: |
          set -euo pipefail
          cargo publish --dry-run --locked

      - name: cargo package --list — sem arquivos sensíveis (gate 10)
        run: |
          set -euo pipefail
          LIST=$(cargo package --list 2>&1)
          echo "$LIST"
          if echo "$LIST" | grep -Ei 'serena|CLAUDE\.md|docs_rules|^logs/|\.log$|^\.claude/|\.enrich-queue|\.ingest-queue' ; then
            echo "::error::arquivos sensíveis detectados no tarball"
            exit 1
          fi

  # -------------------------------------------------------------------------
  # Smoke test musl — garante compatibilidade com Alpine Linux e containers.
  # -------------------------------------------------------------------------
  musl_smoke:
    name: musl static binary smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build --release --target x86_64-unknown-linux-musl
        run: |
          set -euo pipefail
          cargo build --release --target x86_64-unknown-linux-musl --locked

      - name: Binary smoke test (--version, --help)
        run: |
          set -euo pipefail
          ./target/x86_64-unknown-linux-musl/release/duckduckgo-search-cli --version
          ./target/x86_64-unknown-linux-musl/release/duckduckgo-search-cli --help

  # -------------------------------------------------------------------------
  # Bloqueio de Co-authored-by de agentes de IA em commits do PR.
  # -------------------------------------------------------------------------
  commit_check:
    name: bloquear Co-authored-by de agentes de IA
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validar commits contra regex de agentes
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          COMMITS=$(git log --format='%H' "$BASE..$HEAD")
          FOUND=0
          for c in $COMMITS; do
            BODY=$(git log -n 1 --format='%B' "$c")
            if echo "$BODY" | grep -iEq 'Co-authored-by:.*(dependabot\[bot\]|renovate\[bot\]|github-actions\[bot\]|Claude|Opus|Sonnet|Haiku|GPT-|Copilot|Cursor|Gemini|Anthropic|OpenAI|Codex|Jules)'; then
              echo "::error::Commit $c contém Co-authored-by proibido:"
              echo "$BODY" | grep -iE 'Co-authored-by:'
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "OK: nenhum Co-authored-by de agente de IA encontrado."

  # -------------------------------------------------------------------------
  # Cron semanal: atualiza Cargo.lock com dependências mais recentes.
  # Cria PR automático se houver updates.
  # Roda apenas em main (não em PRs de feature).
  # -------------------------------------------------------------------------
  scheduled_update:
    name: weekly dependency update
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo update --workspace
        run: |
          set -euo pipefail
          cargo update --workspace --locked false || cargo update --workspace

      - name: Check for changes
        id: check_changes
        run: |
          set -euo pipefail
          if git diff --quiet Cargo.lock; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "Nenhuma atualização disponível"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Atualizações detectadas"
          fi

      - name: Create PR with updates
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore(deps): weekly cargo update $(date -u +%Y-%m-%d)"
          git push origin HEAD:deps/weekly-update-$(date -u +%Y%m%d)
          gh pr create \
            --title "chore(deps): weekly cargo update" \
            --body "Atualização semanal automática de dependências via \`cargo update --workspace\`." \
            --base main \
            --head "deps/weekly-update-$(date -u +%Y%m%d)" \
            --label "dependencies" \
            --reviewer daniloaguiarbr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # Security scan de workflows com zizmor.
  # Detecta padrões inseguros em GitHub Actions YAML.
  # -------------------------------------------------------------------------
  zizmor:
    name: workflow security scan (zizmor)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install zizmor
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/woodruffw/zizmor/releases/latest/download/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar xzf - -C /tmp
          sudo mv /tmp/zizmor /usr/local/bin/

      - name: Run zizmor
        run: |
          set -euo pipefail
          zizmor --persona=auditor .github/workflows/

  # -------------------------------------------------------------------------
  # Actionlint — valida sintaxe de workflows.
  # -------------------------------------------------------------------------
  actionlint:
    name: workflow syntax check (actionlint)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download actionlint
        id: get_actionlint
        run: |
          set -euo pipefail
          URL=$(curl -fsSL https://api.github.com/repos/rhysd/actionlint/releases/latest \
            | jaq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' 2>/dev/null \
            || echo "https://github.com/rhysd/actionlint/releases/latest/download/actionlint_1.7.12_linux_amd64.tar.gz")
          curl -fsSL "$URL" | tar xzf - -C /tmp
          sudo mv /tmp/actionlint /usr/local/bin/
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Run actionlint
        run: |
          set -euo pipefail
          actionlint -version
          actionlint .github/workflows/
