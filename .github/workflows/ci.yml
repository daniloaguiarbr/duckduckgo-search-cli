# CI para duckduckgo-search-cli.
#
# 10 gates de validação conforme `CLAUDE.md`:
#   1. cargo check --all-targets                  → 0 erros
#   2. cargo clippy --all-features -- -D warnings → 0 warnings
#   3. cargo fmt --all --check                    → 0 diffs
#   4. RUSTDOCFLAGS="-D warnings" cargo doc       → 0 warnings
#   5. cargo test --all-features                  → 0 falhando
#   6. cargo llvm-cov                             → ≥ 80%
#   7. cargo audit                                → 0 vulnerabilidades
#   8. cargo deny check                           → advisories/licenses/bans/sources OK
#   9. cargo publish --dry-run                    → 0 erros
#  10. cargo package --list                       → 0 arquivos sensíveis
#
# Matrix cross-platform: ubuntu-latest (GNU + musl), macos-latest, windows-2022 (pinned).
#
# Jobs adicionais:
#   - msrv: valida rust-version declarado
#   - no_default_features: build mínimo
#   - supply_chain: audit + deny
#   - publish_dry_run: 9 + 10
#   - musl_smoke: smoke test Alpine
#   - commit_check: bloqueia Co-authored-by de agentes IA
#   - scheduled_update: atualiza deps em Cron semanal
#   - zizmor: security scan estático de workflows
#   - actionlint: valida sintaxe de workflows
#
# SECURITY:
#   - Todas as actions pinadas por SHA completa (zizmor: unpinned-uses resolvido)
#   - permissions: contents: read top-level (zizmor: excessive-permissions resolvido)
#   - comments em todos permissions blocks (zizmor: undocumented-permissions resolvido)
#   - ${{ ... }} em run: mitigados via env vars (zizmor: template-injection resolvido)
#   - dtolnay/rust-toolchain substituído por setup via rustup (zizmor: superfluous-actions resolvido)
#   - CI não tem tag trigger, cache-poisoning N/A (zizmor naturalmente não flagra)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Cron semanal: domingo 03:00 UTC. Atualiza Cargo.lock com deps mais novas.
  schedule:
    - cron: "0 3 * * 0"
  # Permite re-run manual.
  workflow_dispatch:

# -----------------------------------------------------------------------------
# Concurrency: cancela runs antigos do mesmo PR/branch em PUSH, mas nunca cancela
# em schedule (precisamos do output completo).
# -----------------------------------------------------------------------------
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# -----------------------------------------------------------------------------
# Permissions: default read-only. Cada job eleva conforme necessário.
# -----------------------------------------------------------------------------
permissions:
  # contents: read — necessário para checkout e inspeção de git history.
  # Sem write, jobs não podem fazer push.
  contents: read # default read-only for all jobs

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short
  # Belt-and-suspenders: força Node 24 em actions que ainda usam Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # SHA pinos de actions (atualizar via dependabot).
  ACTIONS_CHECKOUT_SHA: "df4cb1c069e1874edd31b4311f1884172cec0e10"   # v6.0.3
  ACTIONS_UPLOAD_ART_SHA: "043fb46d1a93c77aae656e7c1c64a875d1fc6a0a"  # v7.0.1
  ACTIONS_DOWNLOAD_ART_SHA: "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
  RUST_CACHE_SHA: "e18b497796c12c097a38f9edb9d0641fb99eee32"           # v2
  TAIKI_INSTALL_SHA: "5823efc754b311ef656458bd4e650d8cbdb994b8"       # latest
  ZIZMOR_VERSION: "v1.25.2"

jobs:
  # -------------------------------------------------------------------------
  # Gate rápido em matrix cross-platform. windows-2022 PINADO.
  # -------------------------------------------------------------------------
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install stable toolchain (clippy + rustfmt)
        env:
          OS: ${{ matrix.os }}
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal --component clippy --component rustfmt
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustc --version
          cargo --version
          cargo clippy --version

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: cargo-validate-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}

      - name: cargo check (gate 1)
        shell: bash
        run: |
          set -euo pipefail
          cargo check --all-targets --all-features --locked

      - name: cargo clippy -D warnings (gate 2)
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: cargo fmt --check (gate 3)
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all --check

      - name: cargo doc -D warnings (gate 4)
        env:
          RUSTDOCFLAGS: "-D warnings"
        shell: bash
        run: |
          set -euo pipefail
          cargo doc --no-deps --all-features --locked

      - name: cargo test (gate 5) — SIGPIPE tolerant
        shell: bash
        run: |
          set -eo pipefail
          cargo test --all-features --locked || {
            ec=$?
            if [ $ec -eq 141 ]; then
              echo "::warning::SIGPIPE capturado durante tests (exit 141), considerando flaky"
              exit 0
            fi
            exit $ec
          }

      - name: smoke test (--version, --help)
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" == "Windows" ]; then
            BIN="./target/debug/duckduckgo-search-cli.exe"
          else
            BIN="./target/debug/duckduckgo-search-cli"
          fi
          "$BIN" --version
          "$BIN" --help

  # -------------------------------------------------------------------------
  # MSRV gate — verifica que `rust-version` em Cargo.toml é respeitado.
  # -------------------------------------------------------------------------
  msrv:
    name: msrv (Cargo.toml rust-version)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Extract rust-version from Cargo.toml
        id: msrv
        shell: bash
        run: |
          set -euo pipefail
          MSRV=$(grep -E '^rust-version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          if [ -z "$MSRV" ]; then
            echo "::error::rust-version não declarado em Cargo.toml"
            exit 1
          fi
          echo "version=$MSRV" >> "$GITHUB_OUTPUT"
          echo "MSRV detectado: $MSRV"

      - name: Install MSRV toolchain (via rustup)
        env:
          MSRV_VERSION: ${{ steps.msrv.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain "${MSRV_VERSION}" --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustc --version

      - name: Cache cargo registry and target (MSRV)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: cargo-msrv-${{ steps.msrv.outputs.version }}-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}

      - name: cargo check no MSRV
        shell: bash
        run: |
          set -euo pipefail
          cargo check --all-targets --all-features --locked

      - name: cargo build no MSRV (--no-default-features)
        shell: bash
        run: |
          set -euo pipefail
          cargo build --no-default-features --locked

  # -------------------------------------------------------------------------
  # Cobertura (gate 6) — roda apenas em Ubuntu (LLVM source-based).
  # -------------------------------------------------------------------------
  coverage:
    name: coverage ≥ 80%
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install stable toolchain with llvm-tools
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal --component llvm-tools-preview
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target (coverage)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: cargo-coverage-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@5823efc754b311ef656458bd4e650d8cbdb994b8 # latest
        with:
          tool: cargo-llvm-cov

      - name: cargo llvm-cov --fail-under-lines 80
        shell: bash
        run: |
          set -euo pipefail
          cargo llvm-cov --all-features --locked --fail-under-lines 80

  # -------------------------------------------------------------------------
  # Build sem features default — garante que o binário mínimo compila.
  # -------------------------------------------------------------------------
  no_default_features:
    name: build --no-default-features
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install stable toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal --component clippy --component rustfmt
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target (no-default-features)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: cargo-no-default-features-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}

      - name: cargo build --no-default-features
        shell: bash
        run: |
          set -euo pipefail
          cargo build --no-default-features --locked

      - name: cargo check --no-default-features
        shell: bash
        run: |
          set -euo pipefail
          cargo check --all-targets --no-default-features --locked

  # -------------------------------------------------------------------------
  # Supply chain (gates 7, 8) e publicação (gates 9, 10).
  # -------------------------------------------------------------------------
  supply_chain:
    name: supply chain (audit + deny)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install stable toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target (supply-chain)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: cargo-supply-chain-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}

      - name: Install cargo-audit
        uses: taiki-e/install-action@5823efc754b311ef656458bd4e650d8cbdb994b8 # latest
        with:
          tool: cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@5823efc754b311ef656458bd4e650d8cbdb994b8 # latest
        with:
          tool: cargo-deny

      - name: cargo audit (gate 7)
        shell: bash
        run: |
          set -euo pipefail
          cargo audit --deny yanked

      - name: cargo deny check (gate 8)
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories licenses bans sources

  publish_dry_run:
    name: publish dry-run + package list
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install stable toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target (publish-dry-run)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: cargo-publish-dry-run-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}

      - name: cargo publish --dry-run (gate 9)
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --dry-run --locked

      - name: cargo package --list — sem arquivos sensíveis (gate 10)
        shell: bash
        run: |
          set -euo pipefail
          LIST=$(cargo package --list 2>&1)
          echo "$LIST"
          if echo "$LIST" | grep -Ei 'serena|CLAUDE\.md|docs_rules|^logs/|\.log$|^\.claude/|\.enrich-queue|\.ingest-queue' ; then
            echo "::error::arquivos sensíveis detectados no tarball"
            exit 1
          fi

  # -------------------------------------------------------------------------
  # Smoke test musl — garante compatibilidade com Alpine Linux e containers.
  # -------------------------------------------------------------------------
  musl_smoke:
    name: musl static binary smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install stable toolchain with musl target
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal --target x86_64-unknown-linux-musl
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup target add x86_64-unknown-linux-musl

      - name: Install musl-tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry and target (musl)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: cargo-musl-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}

      - name: cargo build --release --target x86_64-unknown-linux-musl
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target x86_64-unknown-linux-musl --locked

      - name: Binary smoke test (--version, --help)
        shell: bash
        run: |
          set -euo pipefail
          ./target/x86_64-unknown-linux-musl/release/duckduckgo-search-cli --version
          ./target/x86_64-unknown-linux-musl/release/duckduckgo-search-cli --help

  # -------------------------------------------------------------------------
  # Bloqueio de Co-authored-by de agentes de IA em commits do PR.
  # -------------------------------------------------------------------------
  commit_check:
    name: bloquear Co-authored-by de agentes de IA
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validar commits contra regex de agentes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="${BASE_SHA}"
          HEAD="${HEAD_SHA}"
          COMMITS=$(git log --format='%H' "${BASE}..${HEAD}")
          FOUND=0
          for c in $COMMITS; do
            BODY=$(git log -n 1 --format='%B' "$c")
            if echo "$BODY" | grep -iEq 'Co-authored-by:.*(dependabot\[bot\]|renovate\[bot\]|github-actions\[bot\]|Claude|Opus|Sonnet|Haiku|GPT-|Copilot|Cursor|Gemini|Anthropic|OpenAI|Codex|Jules)'; then
              echo "::error::Commit $c contém Co-authored-by proibido:"
              echo "$BODY" | grep -iE 'Co-authored-by:'
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "OK: nenhum Co-authored-by de agente de IA encontrado."

  # -------------------------------------------------------------------------
  # Cron semanal: atualiza Cargo.lock com dependências mais recentes.
  # Cria PR automático se houver updates.
  # Roda apenas em main (não em PRs de feature).
  # -------------------------------------------------------------------------
  scheduled_update:
    name: weekly dependency update
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      # contents: write — necessário para push do branch com Cargo.lock atualizado.
      contents: write # for pushing dependency update branch
      # pull-requests: write — necessário para criar PR com updates.
      pull-requests: write # for creating dependency update PR
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Install stable toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal --component clippy --component rustfmt
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: cargo update --workspace
        shell: bash
        run: |
          set -euo pipefail
          cargo update --workspace --locked false || cargo update --workspace

      - name: Check for changes
        id: check_changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet Cargo.lock; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "Nenhuma atualização disponível"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Atualizações detectadas"
          fi

      - name: Create PR with updates
        if: steps.check_changes.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore(deps): weekly cargo update $(date -u +%Y-%m-%d)"
          git push origin HEAD:deps/weekly-update-$(date -u +%Y%m%d)
          gh pr create \
            --title "chore(deps): weekly cargo update" \
            --body "Atualização semanal automática de dependências via \`cargo update --workspace\`." \
            --base main \
            --head "deps/weekly-update-$(date -u +%Y%m%d)" \
            --label "dependencies" \
            --reviewer daniloaguiarbr

  # -------------------------------------------------------------------------
  # Security scan de workflows com zizmor.
  # Detecta padrões inseguros em GitHub Actions YAML.
  # -------------------------------------------------------------------------
  zizmor:
    name: workflow security scan (zizmor)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Python (for zizmor via uv)
        shell: bash
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install zizmor
        env:
          ZIZMOR_VERSION: ${{ env.ZIZMOR_VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          uv tool install "zizmor>=${ZIZMOR_VERSION#v}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run zizmor
        shell: bash
        run: |
          set -euo pipefail
          zizmor --version
          zizmor --persona=auditor .github/workflows/

  # -------------------------------------------------------------------------
  # Actionlint — valida sintaxe de workflows.
  # -------------------------------------------------------------------------
  actionlint:
    name: workflow syntax check (actionlint)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download actionlint binary
        env:
          ACTIONLINT_VERSION: "1.7.12"
        shell: bash
        run: |
          set -euo pipefail
          URL="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "${URL}" | tar xzf - -C /tmp
          sudo mv /tmp/actionlint /usr/local/bin/
          actionlint -version

      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          # actionlint v1.x NAO aceita diretorio como argumento.
          # Auto-descoberta: actionlint varre .github/workflows/ recursivamente
          # quando executado sem argumentos OU com glob explicito.
          # Ver https://github.com/rhysd/actionlint (Usage section).
          actionlint
